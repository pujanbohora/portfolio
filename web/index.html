<!DOCTYPE html>
<html>
<head>
    <base href="$FLUTTER_BASE_HREF">
    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A new Flutter project.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="pujan_bohora">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">
    <link rel="icon" type="image/png" href="favicon.png"/>
    <link rel="manifest" href="manifest.json">
    <title>Pujan Bohora</title>

    <!-- Lottie Web -->
    <script src="https://unpkg.com/lottie-web@5.9.6/build/player/lottie.min.js"></script>
</head>
<body>

<!-- Lottie Loader -->
<div id="loader" style="
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: white;
    z-index: 9999;">
    <div id="lottie" style="width: 200px; height: 200px;"></div>
</div>

<!-- Flutter App -->
<script src="flutter_bootstrap.js" async></script>

<!-- Remove Loader on Load -->
<script>

    lottie.loadAnimation({
      container: document.getElementById('lottie'),
      renderer: 'svg',
      loop: true,
      autoplay: true,
      path: "icons/loading.json",
      rendererSettings: {
        preserveAspectRatio: 'xMidYMid meet'
      }
    }).addEventListener('DOMLoaded', function () {
      console.log(" Lottie loaded");
    });

  window.addEventListener("load", function () {
  setTimeout(() => {
    const loader = document.getElementById("loader");
    if (loader) loader.remove();
  }, 2000); // 2 seconds delay
});

</script>
</body>
</html>
